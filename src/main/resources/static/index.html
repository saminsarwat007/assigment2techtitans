<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Records - TECH TITANS</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --accent-2: #22c55e;
            --danger: #ef4444;
            --text: #e2e8f0;
            --muted: #94a3b8;
            --border: #334155;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(160deg, #0f172a, #111827);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.6);
        }
        header h1 { margin: 0; font-size: 22px; letter-spacing: 0.3px; }
        header .group { color: var(--muted); font-size: 13px; }
        #caption {
            display: none;
            margin: 0;
            padding: 14px 32px;
            background: var(--accent);
            color: #06283d;
            font-weight: 600;
            font-size: 15px;
        }
        .container {
            max-width: 1040px;
            margin: 0 auto;
            padding: 28px 32px 64px;
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 24px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
        }
        .card h2 { margin: 0 0 16px; font-size: 16px; }
        label { display: block; font-size: 12px; color: var(--muted); margin: 10px 0 4px; }
        input {
            width: 100%;
            padding: 9px 11px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: var(--text);
            font-size: 14px;
        }
        input:focus { outline: 2px solid var(--accent); border-color: transparent; }
        .row { display: flex; gap: 10px; }
        .row > div { flex: 1; }
        button {
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform .05s ease, opacity .15s ease;
        }
        button:active { transform: scale(.97); }
        .btn-primary { background: var(--accent); color: #06283d; width: 100%; margin-top: 16px; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .btn-edit { background: #334155; color: var(--text); padding: 6px 10px; font-size: 12px; }
        .btn-del { background: var(--danger); color: #fff; padding: 6px 10px; font-size: 12px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 16px; }
        .search-bar input { flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 10px 8px; font-size: 13px; border-bottom: 1px solid var(--border); }
        th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: .5px; }
        .badge { background: #0f172a; border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; font-size: 11px; color: var(--accent); }
        #toast {
            position: fixed;
            bottom: 24px; right: 24px;
            background: var(--card);
            border: 1px solid var(--border);
            border-left: 4px solid var(--accent-2);
            padding: 14px 18px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(10px);
            transition: all .25s ease;
            max-width: 360px;
        }
        #toast.show { opacity: 1; transform: translateY(0); }
        #toast.error { border-left-color: var(--danger); }
        .empty { color: var(--muted); font-size: 13px; padding: 18px 8px; }
        .form-title { display:flex; justify-content: space-between; align-items:center; }
    </style>
</head>
<body>
    <header>
        <h1>Student Records System</h1>
        <span class="group">SECJ4383 &middot; Group TECH TITANS</span>
    </header>
    <p id="caption"></p>

    <div class="container">
        <div class="card">
            <div class="form-title">
                <h2 id="formTitle">Register Student</h2>
                <button type="button" id="cancelEdit" class="btn-ghost" style="display:none;">Cancel</button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId">
                <label for="name">Full Name</label>
                <input id="name" data-testid="name" placeholder="e.g. Aisha Khan">
                <label for="matricNo">Matric Number</label>
                <input id="matricNo" data-testid="matricNo" placeholder="e.g. A22EC1234">
                <label for="program">Program</label>
                <input id="program" data-testid="program" placeholder="e.g. Computer Science">
                <div class="row">
                    <div>
                        <label for="email">Email</label>
                        <input id="email" data-testid="email" placeholder="name@graduate.utm.my">
                    </div>
                    <div>
                        <label for="cgpa">CGPA</label>
                        <input id="cgpa" data-testid="cgpa" placeholder="3.50">
                    </div>
                </div>
                <button type="submit" class="btn-primary" id="submitBtn" data-testid="submit">Add Student</button>
            </form>
        </div>

        <div class="card">
            <h2>Students</h2>
            <div class="search-bar">
                <input id="searchInput" data-testid="search" placeholder="Search by name or program...">
                <button class="btn-edit" id="searchBtn" data-testid="searchBtn">Search</button>
                <button class="btn-ghost" id="showAllBtn" data-testid="showAll">Show All</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th><th>Name</th><th>Matric</th><th>Program</th><th>CGPA</th><th></th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
            <div id="emptyState" class="empty" style="display:none;">No students found.</div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const API = "/api/students";
        const form = document.getElementById("studentForm");
        const tableBody = document.getElementById("tableBody");
        const emptyState = document.getElementById("emptyState");
        const submitBtn = document.getElementById("submitBtn");
        const formTitle = document.getElementById("formTitle");
        const cancelEdit = document.getElementById("cancelEdit");

        function toast(msg, isError) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.className = "show" + (isError ? " error" : "");
            setTimeout(() => { t.className = ""; }, 3200);
        }

        function fields() {
            return {
                name: document.getElementById("name").value.trim(),
                matricNo: document.getElementById("matricNo").value.trim(),
                program: document.getElementById("program").value.trim(),
                email: document.getElementById("email").value.trim(),
                cgpa: parseFloat(document.getElementById("cgpa").value) || 0
            };
        }

        function resetForm() {
            form.reset();
            document.getElementById("studentId").value = "";
            formTitle.textContent = "Register Student";
            submitBtn.textContent = "Add Student";
            cancelEdit.style.display = "none";
        }

        async function loadStudents(url) {
            const res = await fetch(url || API);
            const data = await res.json();
            render(data);
        }

        function render(students) {
            tableBody.innerHTML = "";
            if (!students.length) { emptyState.style.display = "block"; return; }
            emptyState.style.display = "none";
            for (const s of students) {
                const tr = document.createElement("tr");
                tr.innerHTML =
                    "<td><span class='badge'>#" + s.id + "</span></td>" +
                    "<td>" + s.name + "</td>" +
                    "<td>" + s.matricNo + "</td>" +
                    "<td>" + s.program + "</td>" +
                    "<td>" + s.cgpa.toFixed(2) + "</td>" +
                    "<td style='text-align:right; white-space:nowrap;'>" +
                        "<button class='btn-edit' data-edit='" + s.id + "'>Edit</button> " +
                        "<button class='btn-del' data-del='" + s.id + "'>Delete</button>" +
                    "</td>";
                tableBody.appendChild(tr);
            }
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const id = document.getElementById("studentId").value;
            const method = id ? "PUT" : "POST";
            const url = id ? API + "/" + id : API;
            const res = await fetch(url, {
                method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(fields())
            });
            if (res.ok) {
                toast(id ? "Student updated successfully" : "Student registered successfully");
                resetForm();
                loadStudents();
            } else {
                const err = await res.json();
                toast(err.message || "Request failed", true);
            }
        });

        tableBody.addEventListener("click", async (e) => {
            const editId = e.target.getAttribute("data-edit");
            const delId = e.target.getAttribute("data-del");
            if (editId) {
                const res = await fetch(API + "/" + editId);
                const s = await res.json();
                document.getElementById("studentId").value = s.id;
                document.getElementById("name").value = s.name;
                document.getElementById("matricNo").value = s.matricNo;
                document.getElementById("program").value = s.program;
                document.getElementById("email").value = s.email;
                document.getElementById("cgpa").value = s.cgpa;
                formTitle.textContent = "Update Student #" + s.id;
                submitBtn.textContent = "Save Changes";
                cancelEdit.style.display = "inline-block";
                window.scrollTo({ top: 0, behavior: "smooth" });
            }
            if (delId) {
                const res = await fetch(API + "/" + delId, { method: "DELETE" });
                if (res.ok) { toast("Student deleted"); loadStudents(); }
            }
        });

        cancelEdit.addEventListener("click", resetForm);

        document.getElementById("searchBtn").addEventListener("click", async () => {
            const q = document.getElementById("searchInput").value.trim();
            if (!q) { loadStudents(); return; }
            let res = await fetch(API + "/search?name=" + encodeURIComponent(q));
            let data = await res.json();
            if (!data.length) {
                res = await fetch(API + "/search?program=" + encodeURIComponent(q));
                data = await res.json();
            }
            render(data);
            toast(data.length + " result(s) for \"" + q + "\"");
        });

        document.getElementById("showAllBtn").addEventListener("click", () => {
            document.getElementById("searchInput").value = "";
            loadStudents();
        });

        loadStudents();
    </script>
</body>
</html>
